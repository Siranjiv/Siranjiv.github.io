<!DOCTYPE HTML>
<html>
	<head>
		<title>Cemented Dreams Dev Blog</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			:root {
				--neon-a: #9e8bff;
				--neon-b: #7de8ff;
				--neon-c: #c3b7ff;
				--ink: #1a1a1a;
			}

			body {
				background:
					radial-gradient(1000px 440px at 8% -8%, rgba(158, 139, 255, 0.24), transparent 60%),
					radial-gradient(900px 420px at 95% 0%, rgba(125, 232, 255, 0.22), transparent 58%),
					#f6f7fb;
			}

			#main {
				padding-top: 2rem;
			}

			.blog-hero {
				text-align: center;
				margin-bottom: 1rem;
			}

			.blog-hero h1 {
				margin-bottom: 0.6rem;
			}

			.blog-hero p {
				max-width: 720px;
				margin: 0 auto;
			}

			.month-group {
				margin: 2.2rem 0 2.8rem;
			}

			.month-group h2 {
				margin-bottom: 1rem;
			}

			.month-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
				gap: 1rem;
			}

			.month-button {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				min-height: 120px;
				text-transform: none;
				letter-spacing: 0.03em;
				font-weight: 700;
				font-size: 1rem;
				color: #ffffff !important;
				text-decoration: none;
				border-radius: 14px;
				border: 0;
				background: linear-gradient(145deg, var(--neon-a) 0%, var(--neon-b) 58%, var(--neon-c) 100%);
				background-size: 220% 100%;
				box-shadow: 0 12px 24px rgba(126, 126, 255, 0.22);
				animation: floatCard 3.3s ease-in-out infinite;
				transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.5s ease;
			}

			.month-button:hover {
				transform: translateY(-6px) scale(1.02);
				box-shadow: 0 16px 30px rgba(125, 232, 255, 0.34);
				background-position: 100% 0;
				color: #F9FAFB !important;
			}

			.month-button:focus,
			.month-button:focus-visible {
				color: #F9FAFB !important;
			}

			.month-grid .month-button:nth-child(2n) { animation-delay: 0.2s; }
			.month-grid .month-button:nth-child(3n) { animation-delay: 0.4s; }

			@keyframes floatCard {
				0% { transform: translateY(0); }
				50% { transform: translateY(-4px); }
				100% { transform: translateY(0); }
			}

			@media (prefers-reduced-motion: reduce) {
				.month-button { animation: none; transition: none; }
				.month-button:hover { transform: none; }
			}
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper" class="fade-in">
			<header id="header">
				<a href="index.html" class="logo">Back To Portfolio</a>
			</header>

			<nav id="nav">
				<ul class="links">
					<li><a href="index.html">Portfolio</a></li>
					<li class="active"><a href="dev-blog.html">Dev Blog</a></li>
				</ul>
			</nav>

			<div id="main">
				<section class="post">
					<header class="major blog-hero">
						<h1>Cemented Dreams Dev Blog</h1>
						<p>Select a month to jump into updates. This page is the start of your dev blog timeline and can be expanded with detailed entries next.</p>
					</header>

					<div class="month-group">
						<h2>2025</h2>
						<div class="month-grid">
							<a class="month-button" href="dev-blog-2025-september.html">September</a>
							<a class="month-button" href="dev-blog-2025-october.html">October</a>
							<a class="month-button" href="dev-blog-2025-november.html">November</a>
						</div>
					</div>

					<div class="month-group">
						<h2>2026</h2>
						<div class="month-grid">
							<a class="month-button" href="dev-blog-2026-january.html">January</a>
							<a class="month-button" href="dev-blog-2026-february.html">February</a>
							<a class="month-button" href="dev-blog-2026-march.html">March</a>
							<a class="month-button" href="dev-blog-2026-april.html">April</a>
						</div>
					</div>
				</section>
			</div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/jquery.scrolly.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
